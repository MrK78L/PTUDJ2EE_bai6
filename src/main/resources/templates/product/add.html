<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{_layout :: layout(~{:: #main-content})}">
<head>
  <meta charset="UTF-8">
  <title>Add Product</title>
</head>
<body>
<div id="main-content">
  <div class="row">
    <div class="col-lg-8 mx-auto">
      <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
      <p class="text-muted mb-4">Fill in the form below to add a new product to your inventory</p>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form th:action="@{/products/save}" th:object="${product}" method="post" class="form">
            <div class="mb-3">
              <label for="name" class="form-label">
                <i class="fas fa-box"></i> Product Name
              </label>
              <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Enter product name" required>
              <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                <small><i class="fas fa-exclamation-circle"></i> <span th:errors="*{name}"></span></small>
              </div>
            </div>

            <div class="mb-3">
              <label for="image" class="form-label">
                <i class="fas fa-image"></i> Image URL
              </label>
              <input class="form-control" type="text" th:field="*{image}" id="image" placeholder="https://example.com/image.jpg">
              <small class="text-muted">
                <i class="fas fa-info-circle"></i> Provide a valid image URL
              </small>
              <div th:if="${#fields.hasErrors('image')}" class="text-danger">
                <small><i class="fas fa-exclamation-circle"></i> <span th:errors="*{image}"></span></small>
              </div>
            </div>

            <div class="mb-3">
              <label for="price" class="form-label">
                <i class="fas fa-dollar-sign"></i> Price (USD)
              </label>
              <input class="form-control" type="number" step="0.01" th:field="*{price}" id="price" placeholder="0.00" min="1" required>
              <div th:if="${#fields.hasErrors('price')}" class="text-danger">
                <small><i class="fas fa-exclamation-circle"></i> <span th:errors="*{price}"></span></small>
              </div>
            </div>

            <div class="mb-3">
              <label for="category" class="form-label">
                <i class="fas fa-tag"></i> Category
              </label>
              <select th:field="*{category.id}" class="form-select" id="category" required>
                <option value="">-- Select Category --</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"></option>
              </select>
              <div th:if="${#fields.hasErrors('category')}" class="text-danger">
                <small><i class="fas fa-exclamation-circle"></i> <span th:errors="*{category}"></span></small>
              </div>
            </div>

            <div class="d-flex gap-3 mt-4">
              <button type="submit" class="btn btn-success px-4">
                <i class="fas fa-save"></i> Add Product
              </button>
              <a th:href="@{/products}" class="btn btn-secondary px-4">
                <i class="fas fa-arrow-left"></i> Back
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
